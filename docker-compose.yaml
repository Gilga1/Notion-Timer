services:
  focus-timer:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      PORT: "5000"
      SESSION_DB_PATH: "/app/data/focus-timer.db.json"
      REWARDS_DB_PATH: "/app/data/rewards.db.json"
    volumes:
      - focus-timer-data:/app/data
    restart: unless-stopped

volumes:
  focus-timer-data:
